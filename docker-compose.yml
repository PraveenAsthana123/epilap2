# Epilepsy Intelligence Platform — local/enterprise deployment
# Usage:  EPI_API_KEY=your-secret docker compose up --build
#   API  -> http://localhost:8000/docs
#   UI   -> http://localhost:8080
services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Set EPI_API_KEY to require X-API-Key on protected endpoints (auth).
      - EPI_API_KEY=${EPI_API_KEY:-}
    restart: unless-stopped

  viewer:
    build:
      context: .
      dockerfile: viewer/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
